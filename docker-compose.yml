services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: privacy_diff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - privacy_diff_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.crawler
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      CRAWLER_SHARED_SECRET: dev-secret-change-in-prod
      WEB_CALLBACK_URL: http://web:3000/api/report-callback
      MAX_CONCURRENT_JOBS: "3"
    networks:
      - privacy_diff_net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/privacy_diff
      CRAWLER_URL: http://crawler:8080
      CRAWLER_SHARED_SECRET: dev-secret-change-in-prod
      PUBLIC_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      crawler:
        condition: service_started
    networks:
      - privacy_diff_net

volumes:
  postgres_data:

networks:
  privacy_diff_net:
    driver: bridge
